<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>OCR 목업 테스트 (fetch 스텁 · 실키 불필요)</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  body { font-family: 'Noto Sans KR', sans-serif; padding: 24px; max-width: 860px; margin: 0 auto; }
  #panel { border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 18px; background: var(--bg-card); }
  #log { font-family: monospace; font-size: 13px; white-space: pre-wrap; background: hsl(220,22%,97%); border-radius: 10px; padding: 14px; }
  .pass { color: #1a7f37; } .fail { color: #c22; font-weight: 700; }
  button.run { padding: 9px 16px; border-radius: 8px; border: none; background: var(--khu-burgundy); color: #fff; font-weight: 700; cursor: pointer; margin: 0 6px 8px 0; }
</style>
</head>
<body>
  <h2>KHU-Weaver · OCR 목업 테스트</h2>
  <p>실제 Gemini 키 없이 에타형/인포21형 응답, 교양 제외, 20장 배치, 429 fallback 흐름을 검증합니다.</p>
  <div id="panel">
    <button class="run" id="run-eta">에타형 시나리오</button>
    <button class="run" id="run-info21">인포21형 시나리오</button>
    <button class="run" id="run-batch">20장 배치 시나리오</button>
    <button class="run" id="run-fallback">429 fallback 시나리오</button>
    <div id="log" style="margin-top:14px;">대기 중…</div>
  </div>

  <h3>실제 OCR UI (목업 응답 기준)</h3>
  <div class="ob-shot-panel active onboarding-card ob-card-wide" style="max-width:100%;">
    <div id="ob-ocr-root"></div>
  </div>

  <script>
    window.KW_CONFIG = {
      GEMINI_API_KEY: "TEST-DUMMY-KEY",
      GEMINI_MODEL: "mock-primary",
      GEMINI_FALLBACK_MODELS: ["mock-fallback"],
      OCR_MAX_FILES: 20
    };

    var MOCK_COURSES = [
      { code: "EE202", name: "회로이론", credits: 3, type: "전공 필수", year: 2, sem: 1 },
      { code: "AMTH1009", name: "미분적분학", credits: 3, type: "전공 기초", year: 1, sem: 1 },
      { code: "EE201", name: "전자기학1", credits: 3, type: "전공 필수", year: 2, sem: 1 },
      { code: "SWCON104", name: "웹/파이선프로그래밍", credits: 3, type: "전공 필수", year: 1, sem: 2 },
      { code: "AMTH1001", name: "미분방정식", credits: 3, type: "전공 기초", year: 2, sem: 1 },
      { code: "APHY1003", name: "물리학및실험2", credits: 3, type: "전공 기초", year: 1, sem: 2 }
    ];
    window.getCurriculum = function () { return { courses: MOCK_COURSES, prerequisites: [], tracks: {}, gradReq: 130 }; };

    var scenario = "eta";
    var fetchCalls = [];
    var RESPONSES = {
      eta: [
        { name: "회로이론", code: "EE202", credits: 3, grade: "A0", semester: "2-1" },
        { name: "미분 적분학", credits: 3, grade: "B+" },
        { name: "전자기학1", code: "EE201", credits: 3, grade: "A-" },
        { name: "성찰과표현", credits: 3, grade: "A+" }
      ],
      info21: [
        { name: "웹/파이썬프로그래밍", code: "SWCON104", credits: 3, grade: "A+" },
        { name: "미분방정식", code: "AMTH1001", credits: 3, grade: "A-" },
        { name: "물리학및실험2", code: "APHY1003", credits: 3, grade: "A0" },
        { name: "세계와시민", credits: 3, grade: "A+" }
      ],
      batch: [
        { name: "회로이론", code: "EE202", credits: 3, grade: "A0" },
        { name: "미분적분학", code: "AMTH1009", credits: 3, grade: "B+" }
      ],
      fallback: [
        { name: "회로이론", code: "EE202", credits: 3, grade: "A0" }
      ]
    };

    window.fetch = function (url, opt) {
      var body = JSON.parse(opt.body);
      var images = body.contents[0].parts.filter(function (p) { return p.inline_data; }).length;
      fetchCalls.push({ url: url, images: images });
      if (scenario === "fallback" && /mock-primary/.test(url)) {
        return Promise.resolve({ ok: false, status: 429, json: function () { return Promise.resolve({ error: "rate" }); } });
      }
      var payload = { candidates: [{ content: { parts: [{ text: JSON.stringify(RESPONSES[scenario]) }] } }] };
      return Promise.resolve({ ok: true, status: 200, json: function () { return Promise.resolve(payload); } });
    };
  </script>
  <script src="../js/ocr.js"></script>
  <script>
    var log = document.getElementById("log");
    function reset(name) { scenario = name; fetchCalls = []; log.textContent = "실행 중…"; }
    function line(ok, msg) { log.innerHTML += '\n<span class="' + (ok ? 'pass' : 'fail') + '">' + (ok ? 'PASS' : 'FAIL') + '</span> ' + msg; }

    KW_OCR.enter({
      getProfile: function () { return { dept: "EE", year: "2024" }; },
      onApply: function () {},
      onBack: function () {},
      onFallbackB: function () {}
    });

    function runScenario(name, fileCount, verify) {
      reset(name);
      var applied = null;
      KW_OCR.enter({
        getProfile: function () { return { dept: "EE", year: "2024" }; },
        onApply: function (gm) { applied = gm; },
        onBack: function () {},
        onFallbackB: function () {}
      });
      var fakeFiles = [];
      for (var i = 0; i < fileCount; i++) fakeFiles.push({ name: "t" + i + ".jpg", mime: "image/jpeg", base64: "AAAA", dataUrl: "" });
      KW_OCR._injectFilesForTest(fakeFiles);
      document.getElementById("ocr-analyze").disabled = false;
      document.getElementById("ocr-analyze").click();

      var tries = 0;
      var iv = setInterval(function () {
        tries++;
        var applyBtn = document.getElementById("ocr-apply");
        if (applyBtn || tries > 60) {
          clearInterval(iv);
          log.textContent = "결과 검증:";
          if (applyBtn) applyBtn.click();
          verify(applied, fetchCalls);
        }
      }, 80);
    }

    document.getElementById("run-eta").onclick = function () {
      runScenario("eta", 1, function (applied) {
        line(Object.keys(applied || {}).length === 3, "에타형 전공 3건 + 교양 1건 제외 → " + JSON.stringify(applied));
        line(applied && applied.AMTH1009 === "B+", "공백 흔들림 과목명 매칭");
      });
    };
    document.getElementById("run-info21").onclick = function () {
      runScenario("info21", 1, function (applied) {
        line(Object.keys(applied || {}).length === 3, "인포21형 전공 3건 + 교양 1건 제외 → " + JSON.stringify(applied));
        line(applied && applied.SWCON104 === "A+", "학수번호 우선 매칭");
      });
    };
    document.getElementById("run-batch").onclick = function () {
      runScenario("batch", 20, function (applied, calls) {
        line(calls.length === 3, "20장을 8/8/4장, 총 3묶음으로 전송 → " + calls.map(function (c) { return c.images; }).join("/"));
        line(Object.keys(applied || {}).length === 2, "중복 응답 병합 → " + JSON.stringify(applied));
      });
    };
    document.getElementById("run-fallback").onclick = function () {
      runScenario("fallback", 1, function (applied, calls) {
        line(calls.length === 2 && /mock-fallback/.test(calls[1].url), "429 뒤 보조 모델 1회 재시도");
        line(applied && applied.EE202 === "A0", "fallback 응답 적용 → " + JSON.stringify(applied));
      });
    };
  </script>
</body>
</html>
