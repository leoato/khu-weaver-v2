[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/ocr"
  to = "/.netlify/functions/ocr"
  status = 200

[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/tests/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/tools/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/netlify/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/*.md"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/.env*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/.gitignore"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[template.environment]
  GEMINI_API_KEY = "Gemini API key used only by the Netlify OCR function"
  GEMINI_FALLBACK_MODELS = "Optional comma-separated fallback models for OCR retries"
